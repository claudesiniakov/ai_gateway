name: Deploy to server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.56.126.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/ai_gateway
            cd /var/www/ai_gateway
            if [ ! -d .git ]; then
              git clone https://github.com/claudesiniakov/ai_gateway.git .
            else
              git pull origin master
            fi
